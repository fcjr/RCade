<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>$GODOT_PROJECT_NAME</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: $GODOT_SPLASH_COLOR;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}
		</style>
		$GODOT_HEAD_INCLUDE
	</head>
	<body>
		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="$GODOT_SPLASH_CLASSES" src="$GODOT_SPLASH" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script>
// bundle of @rcade/sdk@0.2.6
window.PluginChannel=class _PluginChannel{port;channel;pendingRequests=new Map;static async acquire(name,version){let nonce=Math.random().toString(36).substring(2,15)+Math.random().toString(36).substring(2,15);return new Promise((resolve,reject)=>{let listener=event=>{if(event.data?.type==="plugin_channel"&&event.data?.nonce===nonce){let port=event.ports[0];if("error"in event.data){window.removeEventListener("message",listener),reject(new Error(event.data.error));return}let{channel}=event.data;if(!channel?.name||!channel?.version||!port){console.warn("Invalid plugin_channel event",event.data);return}window.removeEventListener("message",listener);let pluginChannel=new _PluginChannel(port,channel);resolve(pluginChannel)}};window.addEventListener("message",listener),window.parent.postMessage({type:"acquire_plugin_channel",nonce,channel:{name,version}},"*")})}constructor(port,channel){this.port=port,this.channel=channel,this.port.addEventListener("message",event=>{let{_nonce}=event.data??{};if(_nonce&&this.pendingRequests.has(_nonce)){let pending=this.pendingRequests.get(_nonce);this.pendingRequests.delete(_nonce),pending.resolve(event.data)}}),this.port.start()}getPort(){return this.port}getVersion(){return String(this.channel.version)}request(message,timeoutMs=5e3){let _nonce=Math.random().toString(36).substring(2,15)+Math.random().toString(36).substring(2,15);return new Promise((resolve,reject)=>{let timeout=setTimeout(()=>{this.pendingRequests.delete(_nonce),reject(new Error("Request timed out"))},timeoutMs);this.pendingRequests.set(_nonce,{resolve:data=>{clearTimeout(timeout),resolve(data)},reject:error=>{clearTimeout(timeout),reject(error)}}),this.port.postMessage({...message,_nonce})})}};function quit(options){for(window.parent.postMessage({type:"quit",options});;);};
// end bundle of @rcade/sdk@0.2.6
		</script>
		<script src="$GODOT_URL"></script>
		<script type="module">
const GODOT_CONFIG = $GODOT_CONFIG;
const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;

window.RCadeInput = {
  register_classic: async (cb) => {
    const classic_channel = await PluginChannel.acquire("@rcade/input-classic", "^1.0.0");
    classic_channel.getPort().addEventListener('message', cb);
  },
  register_spinners: async (cb) => {
    const spinner_channel = await PluginChannel.acquire("@rcade/input-spinners", "^1.0.0");
    spinner_channel.getPort().addEventListener('message', cb);
  }
};

const engine = new Engine(GODOT_CONFIG);

(function () {
	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');

	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) {
			return;
		}
		if (mode === 'hidden') {
			statusOverlay.remove();
			initializing = false;
			return;
		}
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) {
			statusNotice.removeChild(statusNotice.lastChild);
		}
		const lines = text.split('\n');
		lines.forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) {
			setStatusNotice(err.message);
		} else if (typeof err === 'string') {
			setStatusNotice(err);
		} else {
			setStatusNotice('An unknown error occurred.');
		}
		setStatusMode('notice');
		initializing = false;
	}

	const missing = Engine.getMissingFeatures({
		threads: GODOT_THREADS_ENABLED,
	});

	if (missing.length !== 0) {
		if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
			let serviceWorkerRegistrationPromise;
			try {
				serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
			} catch (err) {
				serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
			}
			// There's a chance that installing the service worker would fix the issue
			Promise.race([
				serviceWorkerRegistrationPromise.then((registration) => {
					if (registration != null) {
						return Promise.reject(new Error('Service worker already exists.'));
					}
					return registration;
				}).then(() => engine.installServiceWorker()),
				// For some reason, `getRegistration()` can stall
				new Promise((resolve) => {
					setTimeout(() => resolve(), 2000);
				}),
			]).then(() => {
				// Reload if there was no error.
				window.location.reload();
			}).catch((err) => {
				console.error('Error while registering service worker:', err);
			});
		} else {
			// Display the message as usual
			const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
			displayFailureNotice(missingMsg + missing.join('\n'));
		}
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function (current, total) {
				if (current > 0 && total > 0) {
					statusProgress.value = current;
					statusProgress.max = total;
				} else {
					statusProgress.removeAttribute('value');
					statusProgress.removeAttribute('max');
				}
			},
		}).then(() => {
			setStatusMode('hidden');
			setTimeout(() => {
				document.getElementById('canvas').focus();
			}, 0);
		}, displayFailureNotice);
	}
})();
		</script>
	</body>
</html>
