name: Publish TS Plugins

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: 'Plugin to publish'
        required: true
        type: choice
        options:
          - input-classic
          - input-spinners
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: repo-commits
  cancel-in-progress: false

env:
  DO_NOT_TRACK: 1
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Configure Git
        run: |
          git config user.name "Frank Chiarulli Jr."
          git config user.email "frank@frankchiarulli.com"

      - name: Bump version
        id: bump
        run: |
          PKG_DIR="plugins/${{ inputs.plugin }}/clients/typescript"

          # Get current version and compute new version
          OLD_VERSION=$(node -e "console.log(require('./$PKG_DIR/package.json').version)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VERSION"
          case "${{ inputs.version_type }}" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          # Bump version
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('$PKG_DIR/package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('$PKG_DIR/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Install to update lockfile
        run: pnpm install

      - name: Commit and tag
        run: |
          git add "plugins/${{ inputs.plugin }}/clients/typescript/package.json" pnpm-lock.yaml
          git commit -m "chore: bump plugin-${{ inputs.plugin }} version to ${{ steps.bump.outputs.new_version }}"
          git tag "plugin-${{ inputs.plugin }}-v${{ steps.bump.outputs.new_version }}"
          git push --no-verify
          git push --no-verify origin "plugin-${{ inputs.plugin }}-v${{ steps.bump.outputs.new_version }}"

  publish:
    name: Publish plugin
    needs: bump
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: plugin-${{ inputs.plugin }}-v${{ needs.bump.outputs.new_version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build --filter=@rcade/plugin-${{ inputs.plugin }}

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish
        working-directory: plugins/${{ inputs.plugin }}/clients/typescript
        run: |
          pnpm pack
          tarball=$(ls *.tgz)
          npm publish "$tarball" --provenance --access public
